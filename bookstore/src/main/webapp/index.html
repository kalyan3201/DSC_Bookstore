<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSC BookStore | Login</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Glass Card */
.container {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 40px 30px;
    width: 320px;
    text-align: center;
    color: white;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.logo {
    width: 80px;
    margin-bottom: 15px;
}

h1 {
    font-size: 1.8rem;
    font-weight: 600;
}

h2 {
    font-size: 0.9rem;
    font-weight: 300;
    margin-bottom: 25px;
    opacity: 0.8;
}

/* Input */
.input-group {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 1rem;
    transition: 0.3s;
}

input:focus {
    box-shadow: 0 0 10px rgba(255,255,255,0.5);
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #ff7a18;
    background: linear-gradient(135deg, #ff7a18, #ffb347);
    color: white;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* Footer */
.footer {
    margin-top: 15px;
    font-size: 0.75rem;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">
    <img src="https://placehold.co/100x100?text=DSC" class="logo" alt="Logo">

    <h1>DSC BookStore</h1>
    <h2>Student Digital Library</h2>

    <form id="loginForm">
        <div class="input-group">
            <input type="text" id="username" placeholder="Enter your name" required>
        </div>
        <button type="submit">Access Library</button>
    </form>

    <div class="footer">© 2026 DSC Library</div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const username = document.getElementById("username").value.trim();

    if (username.length < 3) {
        alert("Name must be at least 3 characters");
        return;
    }

    localStorage.setItem("username", username);

    // Smooth redirect effect
    document.body.style.opacity = "0";
    setTimeout(() => {
        window.location.href = "home.html";
    }, 500);
});
</script>

</body>
</html>
